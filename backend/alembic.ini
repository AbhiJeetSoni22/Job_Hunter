# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration filenames
# Produces: 0001_add_jobs_table.py style names
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
# timezone = UTC

# Maximum length of slugified migration message
truncate_slug_length = 40

# sqlalchemy.url is overridden in alembic/env.py from pydantic Settings.
# This placeholder prevents Alembic from erroring on startup.
sqlalchemy.url = postgresql://placeholder

# Output encoding for generated migration files
output_encoding = utf-8

[post_write_hooks]
# Automatically format generated migration files with ruff
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# ── Logging ────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S